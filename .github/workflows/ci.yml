name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc nasm python3 qemu-system-x86 mtools

      - name: Build kvikdos
        run: make -C kvikdos kvikdos

      - name: Build all modules (make)
        run: make

      - name: Run integration tests (make test)
        run: make test
        timeout-minutes: 10

      - name: Build bootable floppy (make deploy)
        run: make deploy
        timeout-minutes: 5

      - name: Verify headless boot (make verify)
        run: make verify
        timeout-minutes: 5

      - name: SYS e2e test (make test-sys)
        run: make test-sys
        timeout-minutes: 10

      - name: Built-in commands e2e test (make test-builtins)
        run: make test-builtins
        timeout-minutes: 5
