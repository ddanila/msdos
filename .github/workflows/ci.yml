name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 20

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Build kvikdos
        run: make -C kvikdos kvikdos

      - name: Build all modules (make)
        run: make

      - name: Run integration tests (make test)
        run: make test
        timeout-minutes: 10

      - name: Build bootable floppy (make deploy)
        run: make deploy
        timeout-minutes: 5

      - name: Upload floppy image
        uses: actions/upload-artifact@v6
        with:
          name: floppy
          path: |
            out/floppy.img
            MS-DOS/v4.0/src/CMD/COMMAND/COMMAND.COM
          retention-days: 14

  e2e-sys:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 10

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Download floppy image
        uses: actions/download-artifact@v6
        with:
          name: floppy

      - name: SYS e2e test
        run: bash tests/test_sys.sh

  e2e-help:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 10

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Download floppy image
        uses: actions/download-artifact@v6
        with:
          name: floppy

      - name: External CMD /? help + EXEPACK tests
        run: bash tests/test_help_qemu.sh

  e2e-misc:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 10

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Download floppy image
        uses: actions/download-artifact@v6
        with:
          name: floppy

      - name: CHKDSK / MODE CON / IFSFUNC / FILESYS e2e tests
        run: bash tests/test_misc_qemu.sh

  e2e-share-nlsfunc-exe2bin:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 10

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Download floppy image
        uses: actions/download-artifact@v6
        with:
          name: floppy

      - name: SHARE / NLSFUNC / EXE2BIN e2e tests
        run: bash tests/test_share_nlsfunc_exe2bin.sh

  e2e-diskcomp-diskcopy:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 10

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Download floppy image
        uses: actions/download-artifact@v6
        with:
          name: floppy

      - name: DISKCOPY / DISKCOMP e2e tests
        run: bash tests/test_diskcomp_diskcopy.sh

  e2e-backup-restore:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 10

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Download floppy image
        uses: actions/download-artifact@v6
        with:
          name: floppy

      - name: BACKUP / RESTORE e2e tests
        run: bash tests/test_backup_restore.sh

  e2e-append:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 10

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Download floppy image
        uses: actions/download-artifact@v6
        with:
          name: floppy

      - name: APPEND e2e tests
        run: bash tests/test_append.sh

  e2e-format:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: vlabel
            variants: "VLABEL"
          - group: s
            variants: "S"
          - group: b
            variants: "B"
          - group: rest
            variants: "F720 TN FOUR ONE EIGHT"

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Download floppy image
        uses: actions/download-artifact@v6
        with:
          name: floppy

      - name: FORMAT e2e tests — ${{ matrix.group }}
        run: bash tests/test_format.sh ${{ matrix.variants }}

  e2e-label:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 10

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Download floppy image
        uses: actions/download-artifact@v6
        with:
          name: floppy

      - name: LABEL interactive e2e tests (serial expect)
        run: bash tests/test_label.sh

  e2e-fdisk:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 10

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Download floppy image
        uses: actions/download-artifact@v6
        with:
          name: floppy

      - name: FDISK e2e test (non-interactive /PRI switch)
        run: bash tests/test_fdisk.sh

  e2e-recover:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 10

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Download floppy image
        uses: actions/download-artifact@v6
        with:
          name: floppy

      - name: RECOVER e2e test (file mode)
        run: bash tests/test_recover.sh

  e2e-assign-subst-join:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 10

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Download floppy image
        uses: actions/download-artifact@v6
        with:
          name: floppy

      - name: ASSIGN / SUBST / JOIN e2e tests
        run: bash tests/test_assign_subst_join.sh

  e2e-debug:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 10

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Download floppy image
        uses: actions/download-artifact@v6
        with:
          name: floppy

      - name: DEBUG G (execute) e2e test
        run: bash tests/test_debug_qemu.sh
