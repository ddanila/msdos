name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 40

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Build kvikdos
        run: make -C kvikdos kvikdos

      - name: Build all modules (make)
        run: make

      - name: Run integration tests (make test)
        run: make test
        timeout-minutes: 10

      - name: Build bootable floppy (make deploy)
        run: make deploy
        timeout-minutes: 5

      - name: SYS e2e test (make test-sys)
        run: make test-sys
        timeout-minutes: 10

      - name: Built-in + FIND e2e tests (make test-builtins)
        run: make test-builtins
        timeout-minutes: 5

      - name: External CMD /? help + EXEPACK tests (make test-help-qemu)
        run: make test-help-qemu
        timeout-minutes: 5
