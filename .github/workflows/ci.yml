name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 20

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Build kvikdos
        run: make -C kvikdos kvikdos

      - name: Build all modules (make)
        run: make

      - name: Run integration tests (make test)
        run: make test
        timeout-minutes: 10

      - name: Build bootable floppy (make deploy)
        run: make deploy
        timeout-minutes: 5

      - name: Upload floppy image
        uses: actions/upload-artifact@v5
        with:
          name: floppy
          path: |
            out/floppy.img
            MS-DOS/v4.0/src/CMD/COMMAND/COMMAND.COM
          retention-days: 14

  e2e-sys:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 10

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Download floppy image
        uses: actions/download-artifact@v5
        with:
          name: floppy

      - name: SYS e2e test
        run: bash tests/test_sys.sh

  e2e-builtins:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 10

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Download floppy image
        uses: actions/download-artifact@v5
        with:
          name: floppy

      - name: Built-in + FIND e2e tests
        run: bash tests/test_builtins.sh

  e2e-help:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 10

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Download floppy image
        uses: actions/download-artifact@v5
        with:
          name: floppy

      - name: External CMD /? help + EXEPACK tests
        run: bash tests/test_help_qemu.sh

  e2e-diskcomp-diskcopy:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 10

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Download floppy image
        uses: actions/download-artifact@v5
        with:
          name: floppy

      - name: DISKCOPY / DISKCOMP e2e tests
        run: bash tests/test_diskcomp_diskcopy.sh

  e2e-backup-restore:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 10

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Download floppy image
        uses: actions/download-artifact@v5
        with:
          name: floppy

      - name: BACKUP / RESTORE e2e tests
        run: bash tests/test_backup_restore.sh
